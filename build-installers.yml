name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r Server/requirements.txt

      - name: Build exe
        working-directory: Server/installer/windows
        run: pyinstaller pictureviewer.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewerServer-Windows
          path: Server/installer/windows/dist/PictureViewerServer.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Server/installer/windows/dist/PictureViewerServer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow for icon generation
        run: pip install Pillow

      - name: Generate icons
        run: python3 Server/installer/icon/generate_icons.py

      - name: Build app and DMG
        run: |
          chmod +x Server/installer/macos/build_macos.sh
          bash Server/installer/macos/build_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewerServer-macOS
          path: Server/installer/macos/PictureViewerServer.dmg

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Server/installer/macos/PictureViewerServer.dmg
